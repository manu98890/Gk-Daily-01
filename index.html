            { q: "ශ්‍රී ලංකාවේ වර්තමාන සාමාන්්‍ය පරිගණක සාක්ෂරතාවය කොපමණද?", options: ["35.9%", "38.4%", "40.2%", "42.5%"], a: "38.4%" }
        ];

        let currentIdx = 0;
        let score = 0;
        let timer = 60;
        let timerInterval;
        const synth = window.speechSynthesis;
        let sinhalaVoice = null;
        const music = document.getElementById('bg-music-player');

        // Load voices
        function loadVoices() {
            const voices = synth.getVoices();
            sinhalaVoice = voices.find(v => v.lang.includes('si') || v.lang.includes('SI'));
        }
        if (speechSynthesis.onvoiceschanged !== undefined) speechSynthesis.onvoiceschanged = loadVoices;

        function initQuiz() {
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('quiz-area').classList.remove('hidden');
            
            // Start Music with low volume
            music.src = playlist[0];
            music.volume = 0.15; // සින්දුවේ සද්දේ අඩුවෙන් (15%)
            music.play();
            
            loadVoices();
            loadQuestion();
        }

        function speakQuiz(text) {
            synth.cancel();
            const msg = new SpeechSynthesisUtterance(text);
            if (sinhalaVoice) msg.voice = sinhalaVoice;
            msg.lang = 'si-LK';
            msg.rate = 0.95;
            
            // Audio Ducking: Voice ඇහෙන කොට සින්දුවේ සද්දේ 3% ට අඩු කරනවා
            music.volume = 0.03;
            msg.onend = () => { music.volume = 0.15; }; // Voice ඉවර වුණාම ආයේ 15% ට එනවා
            
            synth.speak(msg);
        }

        function loadQuestion() {
            clearInterval(timerInterval);
            timer = 60;
            updateTimerUI();

            // Change music track for each question to keep it interesting
            music.src = playlist[currentIdx % playlist.length];
            music.play();

            const data = quizData[currentIdx];
            document.getElementById('current-index-display').innerText = currentIdx + 1;
            document.getElementById('question-display').innerText = data.q;
            document.getElementById('progress-bar').style.width = ((currentIdx + 1) / quizData.length * 100) + "%";

            const grid = document.getElementById('options-grid');
            grid.innerHTML = '';
            document.getElementById('next-btn').classList.add('hidden');
            document.getElementById('feedback').classList.add('hidden');

            data.options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = "option-btn p-4 text-left glass-effect border border-slate-700 rounded-xl hover:border-blue-500 transition-all duration-200 hover:bg-blue-600/10 w-full active:scale-95";
                btn.innerText = opt;
                btn.onclick = () => checkAnswer(opt, btn);
                grid.appendChild(btn);
            });

            startTimer();
            setTimeout(() => speakQuiz(`ප්‍රශ්න අංක ${currentIdx + 1}. ${data.q}`), 800);
        }

        function startTimer() {
            timerInterval = setInterval(() => {
                timer--;
                updateTimerUI();
                if (timer <= 0) { clearInterval(timerInterval); handleTimeUp(); }
            }, 1000);
        }

        function updateTimerUI() {
            document.getElementById('timer-text').innerText = timer;
            const circle = document.getElementById('timer-circle');
            const offset = (timer / 60) * 175.9;
            circle.style.strokeDashoffset = 175.9 - offset;
        }

        function checkAnswer(selected, btn) {
            clearInterval(timerInterval);
            const correct = quizData[currentIdx].a;
            const allBtns = document.querySelectorAll('.option-btn');
            allBtns.forEach(b => b.disabled = true);

            if (selected === correct) {
                score++;
                btn.classList.add('bg-emerald-600/40', 'border-emerald-500', 'shadow-[0_0_15px_rgba(16,185,129,0.4)]');
                showFeedback("නිවැරදියි! ✅", "bg-emerald-500/20 text-emerald-400 border-emerald-500/30");
                speakQuiz("නිවැරදියි.");
            } else {
                btn.classList.add('bg-red-600/40', 'border-red-500', 'shadow-[0_0_15px_rgba(239,68,68,0.4)]');
                showFeedback(`වැරදියි. නිවැරදි පිළිතුර: ${correct}`, "bg-red-500/20 text-red-400 border-red-500/30");
                speakQuiz("පිළිතුර වැරදියි.");
            }
            document.getElementById('next-btn').classList.remove('hidden');
        }

        function handleTimeUp() {
            const correct = quizData[currentIdx].a;
            document.querySelectorAll('.option-btn').forEach(b => b.disabled = true);
            showFeedback(`කාලය අවසන්! නිවැරදි පිළිතුර: ${correct}`, "bg-orange-500/20 text-orange-400 border-orange-500/30 shadow-[0_0_15px_rgba(249,115,22,0.3)]");
            document.getElementById('next-btn').classList.remove('hidden');
            speakQuiz("කාලය අවසන්.");
        }

        function showFeedback(text, classes) {
            const fb = document.getElementById('feedback');
            fb.innerText = text;
            fb.className = `p-4 rounded-xl font-bold text-center mb-4 ${classes}`;
            fb.classList.remove('hidden');
        }

        function nextQuestion() {
            if (currentIdx < quizData.length - 1) {
                currentIdx++;
                loadQuestion();
            } else {
                showFinalResults();
            }
        }

        function jumpToQuestion(event) {
            const container = document.getElementById('progress-container');
            const rect = container.getBoundingClientRect();
            const x = event.clientX - rect.left;
            const percentage = x / rect.width;
            currentIdx = Math.floor(percentage * quizData.length);
            loadQuestion();
        }

        function showFinalResults() {
            music.pause();
            document.getElementById('quiz-area').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');
            document.getElementById('score-display').innerText = score;
            speakQuiz(`අභියෝගය අවසන්. ඔබ ප්‍රශ්න පනහෙන් ${score} ක් නිවැරදිව සම්පූර්ණ කළා.`);
        }
    </script>
</body>
</html>
